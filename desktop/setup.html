<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>艾琳 ERP 連線設定</title>
  <link rel="stylesheet" href="setup.css">
</head>
<body>
  <main>
    <section class="brand">
      <div class="mark">E</div>
      <div><h1>艾琳 ERP</h1><p>企業 ERP／零售 POS／餐飲 POS 安全工作站</p></div>
    </section>

    <div id="message" class="message" hidden></div>

    <section id="ready" class="card" hidden>
      <div class="status"><span></span>此電腦已完成授權</div>
      <dl>
        <div><dt>公司代碼</dt><dd id="readyCompany"></dd></div>
        <div><dt>公司主機</dt><dd id="readyServer"></dd></div>
        <div><dt>裝置代碼</dt><dd id="readyDevice"></dd></div>
        <div><dt>離線租約</dt><dd id="readyExpiry"></dd></div>
      </dl>
      <button id="openButton" class="primary">開啟 ERP／POS</button>
      <button id="resetButton" class="secondary">重新輸入啟用碼</button>
    </section>

    <form id="setup" class="card" hidden>
      <h2>第一次連線</h2>
      <p class="hint">只要輸入艾琳設計付款開通後提供的啟用碼，系統就會自動找到正確的公司與最新主機 IP。</p>
      <label>啟用碼
        <input id="activationKey" required type="password" placeholder="ERP-…" autocomplete="off">
      </label>
      <p class="security">啟用碼與裝置私鑰會使用 macOS Keychain 或 Windows DPAPI 加密保存。私鑰不會傳送到中央或公司主機。</p>
      <div class="setup-actions">
        <button id="saveButton" class="primary" type="submit">驗證啟用碼並自動連線</button>
        <button id="clearButton" class="secondary" type="button">清除舊連線設定</button>
      </div>
      <p class="clear-help">網路或 IP 變更後會自動重新尋找主機；換電腦時使用相同啟用碼即可自動移轉席次。</p>
    </form>
  </main>
  <script src="setup.js"></script>
</body>
</html>
