name: Publish ERP Host container image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "prisma/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - ".github/workflows/publish-host-container-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-host-container-image
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: erin20080306/erp-inventory-management-copy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=艾琳 ERP 公司主機
            org.opencontainers.image.description=艾琳 ERP 本機公司主機映像
            org.opencontainers.image.source=https://github.com/erin20080306/ERP-inventory-management-copy

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show required package visibility setting
        run: |
          echo "Image published: ghcr.io/${IMAGE_NAME}:latest"
          echo "The GHCR package must be Public so customer Host installers can pull it anonymously."
