name: Build local ERP image and installers

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: erp
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d erp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: github-actions-only-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run db:rehearse
      - run: npm run test:fulfillment
      - run: npm run test:pos
      - run: npm run test:pos-hardware
      - run: npm run test:pos-offers
      - run: npm run test:pos-restaurant
      - run: npm run test:pos-recovery
      - run: npm run test:backup
      - run: npm run test:einvoice
      - run: npm run test:commercial
      - run: npm run test:commercial-contact
      - run: npm run test:accounting
      - run: npm run test:resilience
      - run: npm run test:release
      - run: npm run test:desktop
      - run: npm run test:update
      - run: npm run test:discovery
      - run: npx tsc --noEmit
      - run: npm run build

  image:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/erin20080306/erp-inventory-management-copy
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - name: Build and push multi-platform Host image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ERIN_RELEASE_SHA=${{ github.sha }}

      - name: Smoke test Apple Silicon Host startup
        env:
          ERP_IMAGE: ghcr.io/erin20080306/erp-inventory-management-copy@${{ steps.build.outputs.digest }}
          COMPOSE_PROJECT_NAME: erinerp-smoke-${{ github.run_id }}
        run: |
          set -eu
          cp docker/Caddyfile Caddyfile
          ENV_FILE=/tmp/erin-erp-smoke.env
          cat > "$ENV_FILE" <<EOF
          ERP_HTTPS_PORT=3443
          SERVER_HOST=127.0.0.1
          ERP_IMAGE=$ERP_IMAGE
          POSTGRES_PASSWORD=github-actions-postgres-password
          NEXTAUTH_URL=https://127.0.0.1:3443
          NEXTAUTH_SECRET=github-actions-nextauth-secret-at-least-32-characters
          ADMIN_USERNAME=admin
          ADMIN_PASSWORD=GithubActions1234
          ADMIN_EMAIL=local-admin@erin-erp.local
          COMPANY_NAME=GitHub Actions
          BUSINESS_MODE=ERP
          CENTRAL_LICENSE_URL=https://example.invalid
          LOCAL_ACTIVATION_KEY=github-actions-local-activation-key
          LOCAL_DEVICE_ID=github-actions-arm64
          LOCAL_DEVICE_NAME=GitHub-Actions
          LOCAL_INSTALLER_TOKEN=github-actions-installer-token
          HOST_BACKUP_DIR=/tmp/erin-erp-smoke-backups
          BACKUP_ENCRYPTION_KEY=github-actions-backup-encryption-key
          BACKUP_RETENTION_DAYS=30
          BACKUP_INTERVAL_HOURS=24
          LICENSE_ED25519_PUBLIC_KEY_B64=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          INTEGRITY_SECRET=github-actions-integrity-secret-at-least-32-characters
          EINVOICE_PROVIDER=
          EINVOICE_ALLOW_MOCK=false
          EINVOICE_ENV=TEST
          EINVOICE_MIG_VERSION=4.1
          EINVOICE_SELLER_TAX_ID=
          EINVOICE_TURNKEY_OUTBOX_DIR=
          EINVOICE_TURNKEY_ACK_DIR=
          EINVOICE_VAN_NAME=
          EINVOICE_VAN_BASE_URL=
          EINVOICE_VAN_CLIENT_ID=
          EINVOICE_VAN_CLIENT_SECRET=
          EOF
          cleanup() {
            result=$?
            if [ "$result" -ne 0 ]; then
              docker compose --env-file "$ENV_FILE" -f docker-compose.local.yml ps || true
              docker compose --env-file "$ENV_FILE" -f docker-compose.local.yml logs --no-color --tail=200 postgres app caddy || true
            fi
            docker compose --env-file "$ENV_FILE" -f docker-compose.local.yml down -v --remove-orphans || true
          }
          trap cleanup EXIT
          DOCKER_DEFAULT_PLATFORM=linux/arm64 docker compose --env-file "$ENV_FILE" -f docker-compose.local.yml up -d postgres app caddy
          for attempt in $(seq 1 90); do
            if curl -kfsS https://127.0.0.1:3443/login >/dev/null; then
              echo "Apple Silicon Host became ready after $((attempt * 2)) seconds."
              exit 0
            fi
            sleep 2
          done
          echo "Apple Silicon Host did not become ready within 180 seconds." >&2
          exit 1

  host-installers:
    needs: [quality, image]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package local server launchers
        run: node scripts/build-host-installers.mjs "${GITHUB_REF_NAME}"
      - uses: actions/upload-artifact@v4
        with:
          name: local-server-installers
          path: |
            dist/desktop/ErinERP-Host-*.zip

  desktop-clients:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: desktop-macos
          - os: windows-latest
            artifact: desktop-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm --prefix desktop ci
      - name: Require Apple signing and notarization secrets
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"
      - name: Require Windows code-signing secrets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if (-not $env:CSC_LINK) { throw "Missing WIN_CSC_LINK" }
          if (-not $env:CSC_KEY_PASSWORD) { throw "Missing WIN_CSC_KEY_PASSWORD" }
      - name: Build signed and notarized macOS clients
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm --prefix desktop run dist:mac -- --x64 --arm64
      - name: Build signed Windows client
        if: runner.os == 'Windows'
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npm --prefix desktop run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/desktop/*.dmg
            dist/desktop/*.zip
            dist/desktop/*.exe
          if-no-files-found: error

  release:
    needs: [host-installers, desktop-clients]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate signed release manifest and SHA-256 checksums
        env:
          RELEASE_SIGNED: "true"
        run: node scripts/write-release-manifest.mjs release-assets "${GITHUB_REF_NAME}"
      - name: Attach tested installers and native clients to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
