name: Apply collapsible sidebar

on:
  push:
    branches: [main]
    paths:
      - ".sidebar-collapse-trigger"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Apply collapsible sidebar patch
        run: |
          node scripts/apply-collapsible-sidebar.mjs
          node scripts/fix-collapsible-sidebar-defaults.mjs
      - name: Verify sidebar safeguards
        run: node scripts/verify-collapsible-sidebar.mjs
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Check formatting
        run: git diff --check
      - name: Commit collapsible sidebar
        run: |
          if git diff --quiet; then
            echo "Collapsible sidebar already applied."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/layout/sidebar-nav.tsx
          git commit -m "fix: let every sidebar section stay collapsed"
          git push origin HEAD:main
