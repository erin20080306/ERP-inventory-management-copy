name: Publish macOS TLS hotfix v1.0.5

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-macos-v1.0.5-hotfix.yml

permissions:
  contents: write

concurrency:
  group: publish-desktop-v1.0.5
  cancel-in-progress: true

jobs:
  publish-macos:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm --prefix desktop ci
      - name: Verify TLS hotfix source
        run: |
          set -euo pipefail
          node --check desktop/bootstrap.cjs
          node -e "const p=require('./desktop/package.json'); if(p.version!=='1.0.5') throw new Error('desktop version must be 1.0.5')"
          grep -q 'localHostTlsRoute' desktop/bootstrap.cjs
          grep -q 'tls.checkServerIdentity(certificateHost' desktop/bootstrap.cjs
      - name: Build Apple Silicon DMG and ZIP
        run: npm --prefix desktop run dist:mac:test
      - name: Verify application bundle
        run: |
          set -euo pipefail
          mount_dir="$(mktemp -d)"
          cleanup() { hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rm -rf "$mount_dir"; }
          trap cleanup EXIT
          hdiutil attach dist/desktop/ErinERP-Desktop-macOS-arm64.dmg -nobrowse -readonly -mountpoint "$mount_dir" >/dev/null
          test -d "$mount_dir/艾琳 ERP.app"
          codesign --verify --deep --strict --verbose=2 "$mount_dir/艾琳 ERP.app"
      - name: Prepare release assets
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp dist/desktop/ErinERP-Desktop-macOS-arm64.dmg release-assets/
          cp dist/desktop/ErinERP-Desktop-macOS-arm64.zip release-assets/
          RELEASE_MANUAL=true node scripts/write-release-manifest.mjs release-assets v1.0.5-desktop
      - name: Publish macOS hotfix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view v1.0.5-desktop >/dev/null 2>&1 || \
            gh release create v1.0.5-desktop --target "$GITHUB_SHA" --title "艾琳 ERP 工作站 v1.0.5" --notes "修正 Mac 更換 Wi-Fi、手機分享網路或路由器後，新 IP 與公司主機既有憑證不一致而無法連線。新版在同一台主機 Mac 使用 loopback 安全相容路由，仍驗證本機 Caddy CA 與原憑證名稱。"
          gh release upload v1.0.5-desktop release-assets/* --clobber
          gh release edit v1.0.5-desktop --latest
          assets="$(gh release view v1.0.5-desktop --json assets --jq '.assets[].name')"
          grep -qx 'ErinERP-Desktop-macOS-arm64.dmg' <<< "$assets"
          grep -qx 'ErinERP-Desktop-macOS-arm64.zip' <<< "$assets"
          grep -qx 'release-manifest.json' <<< "$assets"
          grep -qx 'SHA256SUMS.txt' <<< "$assets"
      - name: Activate v1.0.5 downloads
        run: |
          set -euo pipefail
          git pull --rebase origin main
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'src/lib/github-workstation-release.ts';
          const source = fs.readFileSync(path, 'utf8');
          const updated = source.replace(/const WORKSTATION_RELEASE_TAG = "[^"]+";/, 'const WORKSTATION_RELEASE_TAG = "v1.0.5-desktop";');
          if (updated === source && !source.includes('v1.0.5-desktop')) throw new Error('workstation release tag marker not found');
          fs.writeFileSync(path, updated);
          NODE
          cat > desktop-release-status.json <<EOF
          {
            "version": "v1.0.5-desktop",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceCommit": "$GITHUB_SHA",
            "macDmg": "ErinERP-Desktop-macOS-arm64.dmg",
            "macZip": "ErinERP-Desktop-macOS-arm64.zip",
            "windowsExe": "ErinERP-Desktop-Windows-x64-Setup.exe",
            "signedAndNotarized": false,
            "status": "published-and-verified"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/github-workstation-release.ts desktop-release-status.json
          git commit -m "chore: activate desktop v1.0.5 downloads [skip ci]" || exit 0
          git push origin HEAD:main
