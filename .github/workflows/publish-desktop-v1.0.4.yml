name: Publish desktop recovery v1.0.4

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-desktop-v1.0.4.yml

permissions:
  contents: write

concurrency:
  group: publish-desktop-v1.0.4
  cancel-in-progress: true

jobs:
  desktop-clients:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: desktop-macos-v1.0.4
          - os: windows-latest
            artifact: desktop-windows-v1.0.4
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm --prefix desktop ci
      - name: Verify desktop recovery source
        shell: bash
        run: |
          node --check desktop/bootstrap.cjs
          node --check desktop/main.cjs
          node --check desktop/hardware-preload.cjs
          node -e "const p=require('./desktop/package.json'); if(p.version!=='1.0.4') throw new Error('desktop version must be 1.0.4')"
      - name: Build macOS Apple Silicon client
        if: runner.os == 'macOS'
        run: npm --prefix desktop run dist:mac:test
      - name: Build Windows x64 client
        if: runner.os == 'Windows'
        run: npm --prefix desktop run dist:win:test
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/desktop/*.dmg
            dist/desktop/*.zip
            dist/desktop/*.exe
          if-no-files-found: error

  release:
    needs: desktop-clients
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate release manifest and checksums
        env:
          RELEASE_MANUAL: "true"
        run: node scripts/write-release-manifest.mjs release-assets v1.0.4-desktop
      - name: Publish repaired desktop clients
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view v1.0.4-desktop >/dev/null 2>&1 || \
            gh release create v1.0.4-desktop --target "$GITHUB_SHA" --title "艾琳 ERP 工作站 v1.0.4" --notes "修正桌面 App 開啟空白、公司主機逾時時無法操作，以及同一台電腦主機 IP 變更後無法自動恢復的問題。"
          gh release upload v1.0.4-desktop release-assets/* --clobber
          gh release edit v1.0.4-desktop --latest
      - name: Verify published files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets="$(gh release view v1.0.4-desktop --json assets --jq '.assets[].name')"
          grep -qx 'ErinERP-Desktop-macOS-arm64.dmg' <<< "$assets"
          grep -qx 'ErinERP-Desktop-macOS-arm64.zip' <<< "$assets"
          grep -qx 'ErinERP-Desktop-Windows-x64-Setup.exe' <<< "$assets"
          grep -qx 'release-manifest.json' <<< "$assets"
          grep -qx 'SHA256SUMS.txt' <<< "$assets"
          echo "Desktop workstation v1.0.4 published successfully"
      - name: Record successful publication on main
        run: |
          set -euo pipefail
          source_commit="$GITHUB_SHA"
          git fetch origin main
          git checkout -B main origin/main
          cat > desktop-release-status.json <<EOF
          {
            "version": "v1.0.4-desktop",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceCommit": "$source_commit",
            "macDmg": "ErinERP-Desktop-macOS-arm64.dmg",
            "macZip": "ErinERP-Desktop-macOS-arm64.zip",
            "windowsExe": "ErinERP-Desktop-Windows-x64-Setup.exe",
            "signedAndNotarized": false,
            "status": "published-and-verified"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add desktop-release-status.json
          git commit -m "chore: record desktop v1.0.4 publication [skip ci]" || exit 0
          git push origin main
