name: Publish repaired macOS workstation v1.0.3

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "scripts/verify-desktop-connection-ui.mjs"
      - "scripts/write-release-manifest.mjs"
      - ".github/workflows/publish-macos-workstation-v1-0-3.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-macos-workstation-v1-0-3
  cancel-in-progress: true

env:
  RELEASE_TAG: v1.0.3-desktop

jobs:
  publish-macos-workstation:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Verify connection setup behavior
        run: node scripts/verify-desktop-connection-ui.mjs

      - name: Build Apple Silicon DMG and ZIP
        id: build
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          rm -rf dist/desktop /tmp/erin-erp-manual-dist build-output
          mkdir -p build-output

          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ] && [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "使用 Apple Developer ID 簽章建置"
            (
              cd desktop
              ./node_modules/.bin/electron-builder \
                --publish=never \
                --mac dmg zip \
                --arm64
            )
            cp dist/desktop/ErinERP-Desktop-macOS-arm64.dmg build-output/
            cp dist/desktop/ErinERP-Desktop-macOS-arm64.zip build-output/
            xcrun notarytool submit build-output/ErinERP-Desktop-macOS-arm64.dmg \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple build-output/ErinERP-Desktop-macOS-arm64.dmg
            echo "signed=true" >> "$GITHUB_OUTPUT"
          else
            echo "未設定 Apple Developer ID，建立 ad-hoc 手動安裝版"
            (
              cd desktop
              unset GH_TOKEN GITHUB_TOKEN
              export CSC_IDENTITY_AUTO_DISCOVERY=false
              ./node_modules/.bin/electron-builder \
                --publish=never \
                --mac dmg zip \
                --arm64 \
                --config.directories.output=/tmp/erin-erp-manual-dist
            )
            cp /tmp/erin-erp-manual-dist/ErinERP-Desktop-macOS-arm64.dmg build-output/
            cp /tmp/erin-erp-manual-dist/ErinERP-Desktop-macOS-arm64.zip build-output/
            echo "signed=false" >> "$GITHUB_OUTPUT"
          fi

          test "$(stat -f%z build-output/ErinERP-Desktop-macOS-arm64.dmg)" -gt 50000000
          test "$(stat -f%z build-output/ErinERP-Desktop-macOS-arm64.zip)" -gt 50000000

      - name: Verify DMG application bundle
        run: |
          set -euo pipefail
          mount_dir="$(mktemp -d)"
          cleanup() { hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rm -rf "$mount_dir"; }
          trap cleanup EXIT
          hdiutil attach build-output/ErinERP-Desktop-macOS-arm64.dmg -nobrowse -readonly -mountpoint "$mount_dir" >/dev/null
          app_path="$mount_dir/艾琳 ERP.app"
          test -d "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Upload build artifact for diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: erin-erp-macos-arm64-v1.0.3
          path: build-output/*
          if-no-files-found: error
          retention-days: 14

      - name: Prepare macOS workstation release
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp build-output/ErinERP-Desktop-macOS-arm64.dmg release-assets/
          cp build-output/ErinERP-Desktop-macOS-arm64.zip release-assets/
          RELEASE_MANUAL=true node scripts/write-release-manifest.mjs release-assets "$RELEASE_TAG"

      - name: Publish repaired workstation release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "艾琳 ERP 工作站 v1.0.3" \
            --notes "修正 macOS 啟動殘留錯誤、加入清除舊連線設定、改善公司主機尚未完成提示，並使用明確的 desktop 工作目錄重新封裝 Apple Silicon DMG／ZIP。未設定 Apple Developer ID 時為 ad-hoc 手動安裝版。"
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
          gh release edit "$RELEASE_TAG" --latest

      - name: Verify published files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          grep -qx 'ErinERP-Desktop-macOS-arm64.dmg' <<< "$assets"
          grep -qx 'ErinERP-Desktop-macOS-arm64.zip' <<< "$assets"
          grep -qx 'release-manifest.json' <<< "$assets"
          grep -qx 'SHA256SUMS.txt' <<< "$assets"
          echo "macOS workstation v1.0.3 published successfully"

      - name: Record successful publication on main
        run: |
          set -euo pipefail
          cat > desktop-release-status.json <<EOF
          {
            "version": "$RELEASE_TAG",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceCommit": "$GITHUB_SHA",
            "macDmg": "ErinERP-Desktop-macOS-arm64.dmg",
            "macZip": "ErinERP-Desktop-macOS-arm64.zip",
            "signedAndNotarized": ${{ steps.build.outputs.signed }},
            "status": "published-and-verified"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add desktop-release-status.json
          git commit -m "chore: record macOS workstation v1.0.3 publication [skip ci]" || exit 0
          git push origin HEAD:main
