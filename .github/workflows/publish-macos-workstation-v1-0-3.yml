name: Legacy macOS workstation v1.0.3 (manual only)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-macos-workstation-v1-0-3
  cancel-in-progress: true

env:
  RELEASE_TAG: v1.0.3-desktop

jobs:
  publish-macos-workstation:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Verify connection setup behavior
        run: node scripts/verify-desktop-connection-ui-v2.mjs

      - name: Build Apple Silicon app, DMG and ZIP
        id: build
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          app_output="/tmp/erin-erp-app-dist"
          build_output="$GITHUB_WORKSPACE/build-output"
          stage_dir="/tmp/erin-erp-dmg-stage"
          app_path="$app_output/mac-arm64/艾琳 ERP.app"

          rm -rf "$app_output" "$build_output" "$stage_dir"
          mkdir -p "$build_output" "$stage_dir"
          exec > >(tee -a "$build_output/workflow.log") 2>&1

          signed=false
          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ] && [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "使用 Apple Developer ID 簽章建立 App"
          else
            echo "未設定 Apple Developer ID，建立 ad-hoc 手動安裝版"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi

          if ! (
            cd desktop
            unset GH_TOKEN GITHUB_TOKEN
            ./node_modules/.bin/electron-builder \
              --publish=never \
              --dir \
              --mac \
              --arm64 \
              --config.directories.output="$app_output"
          ) >"$build_output/electron-builder.log" 2>&1; then
            echo "::warning::electron-builder 最後回傳非零狀態；將以實際產生的 App 與最終 DMG 驗證結果判定是否可發布。"
          fi
          cat "$build_output/electron-builder.log"

          if [ ! -d "$app_path" ]; then
            echo "找不到已產生的 App：$app_path"
            find "$app_output" -maxdepth 3 -print || true
            exit 1
          fi
          echo "已找到 App，開始建立 ZIP 與 DMG。"

          echo "建立 ZIP"
          ditto -c -k --sequesterRsrc --keepParent \
            "$app_path" \
            "$build_output/ErinERP-Desktop-macOS-arm64.zip"

          echo "建立 DMG"
          ditto "$app_path" "$stage_dir/艾琳 ERP.app"
          ln -s /Applications "$stage_dir/Applications"
          hdiutil create \
            -volname "艾琳 ERP" \
            -srcfolder "$stage_dir" \
            -ov \
            -format UDZO \
            "$build_output/ErinERP-Desktop-macOS-arm64.dmg" \
            2>&1 | tee "$build_output/hdiutil.log"

          if [ -n "${CSC_LINK:-}" ] && [ -n "${CSC_KEY_PASSWORD:-}" ] && [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
            echo "提交 Apple 公證"
            xcrun notarytool submit "$build_output/ErinERP-Desktop-macOS-arm64.dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$build_output/ErinERP-Desktop-macOS-arm64.dmg"
            signed=true
          fi

          echo "signed=$signed" >> "$GITHUB_OUTPUT"
          test "$(stat -f%z "$build_output/ErinERP-Desktop-macOS-arm64.dmg")" -gt 50000000
          test "$(stat -f%z "$build_output/ErinERP-Desktop-macOS-arm64.zip")" -gt 50000000

      - name: Verify DMG application bundle
        run: |
          set -euo pipefail
          mount_dir="$(mktemp -d)"
          cleanup() { hdiutil detach "$mount_dir" >/dev/null 2>&1 || true; rm -rf "$mount_dir"; }
          trap cleanup EXIT
          hdiutil attach build-output/ErinERP-Desktop-macOS-arm64.dmg -nobrowse -readonly -mountpoint "$mount_dir" >/dev/null
          app_path="$mount_dir/艾琳 ERP.app"
          test -d "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Upload build artifact for diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erin-erp-macos-arm64-v1.0.3
          path: build-output/*
          if-no-files-found: warn
          retention-days: 14

      - name: Prepare macOS workstation release
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp build-output/ErinERP-Desktop-macOS-arm64.dmg release-assets/
          cp build-output/ErinERP-Desktop-macOS-arm64.zip release-assets/
          RELEASE_MANUAL=true node scripts/write-release-manifest.mjs release-assets "$RELEASE_TAG"

      - name: Publish repaired workstation release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "艾琳 ERP 工作站 v1.0.3" \
            --notes "修正 macOS 啟動殘留錯誤、加入清除舊連線設定、改善公司主機尚未完成提示。Apple Silicon App 完成後以 macOS 原生 ditto 與 hdiutil 建立 ZIP／DMG，再掛載 DMG 驗證 App 簽章；未設定 Apple Developer ID 時為 ad-hoc 手動安裝版。"
          gh release upload "$RELEASE_TAG" release-assets/* --clobber
          gh release edit "$RELEASE_TAG" --latest

      - name: Verify published files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          grep -qx 'ErinERP-Desktop-macOS-arm64.dmg' <<< "$assets"
          grep -qx 'ErinERP-Desktop-macOS-arm64.zip' <<< "$assets"
          grep -qx 'release-manifest.json' <<< "$assets"
          grep -qx 'SHA256SUMS.txt' <<< "$assets"
          echo "macOS workstation v1.0.3 published successfully"

      - name: Record successful publication on main
        run: |
          set -euo pipefail
          cat > desktop-release-status.json <<EOF
          {
            "version": "$RELEASE_TAG",
            "publishedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sourceCommit": "$GITHUB_SHA",
            "macDmg": "ErinERP-Desktop-macOS-arm64.dmg",
            "macZip": "ErinERP-Desktop-macOS-arm64.zip",
            "signedAndNotarized": ${{ steps.build.outputs.signed }},
            "status": "published-and-verified"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add desktop-release-status.json
          git commit -m "chore: record macOS workstation v1.0.3 publication [skip ci]" || exit 0
          git push origin HEAD:main
